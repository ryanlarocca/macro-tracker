<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Macro Tracker</title>
  <meta name="description" content="Track your daily macros and nutrition">
  <meta name="theme-color" content="#43e97b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Macros">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" type="image/png" href="icon-192.png">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0f0f13;
      --card: #1a1a24;
      --card2: #22222f;
      --accent: #6c63ff;
      --green: #43e97b;
      --red: #ff6b6b;
      --yellow: #ffd166;
      --text: #f0f0f5;
      --muted: #8888aa;
      --border: #2e2e42;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom);
    }

    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      padding-top: calc(16px + env(safe-area-inset-top));
      display: flex;
      align-items: center;
      justify-content: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo { font-size: 1.3rem; font-weight: 700; }
    .logo span { color: var(--green); }

    nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      background: var(--card);
      border-top: 1px solid var(--border);
      padding: 10px 20px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
      z-index: 200;
      gap: 0;
    }

    .nav-btn {
      flex: 1;
      background: none;
      border: none;
      color: var(--muted);
      padding: 8px 0;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .nav-btn .nav-icon { font-size: 1.3rem; }
    .nav-btn .nav-label { font-size: 0.7rem; }

    .nav-btn.active {
      color: var(--green);
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 16px;
      padding-bottom: calc(90px + env(safe-area-inset-bottom));
    }

    /* Views */
    .view { display: none; }
    .view.active { display: block; }

    /* Macro Cards */
    .macro-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .macro-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px;
      border: 1px solid var(--border);
    }

    .macro-card-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .macro-emoji { font-size: 1.1rem; }

    .macro-label {
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    .macro-values {
      margin-bottom: 6px;
    }

    .macro-consumed {
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1;
    }

    .macro-target {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .macro-bar {
      font-size: 0.7rem;
      letter-spacing: 1px;
      margin: 6px 0 4px;
      line-height: 1;
    }

    .macro-pct {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .macro-remaining {
      font-size: 0.75rem;
      font-weight: 600;
      margin-top: 2px;
    }

    .remaining-ok { color: var(--green); }
    .remaining-warn { color: var(--yellow); }
    .remaining-over { color: var(--red); }

    /* Section heading */
    .section-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 20px 0 10px;
    }

    /* Chart card */
    .chart-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .chart-card canvas { max-height: 220px; }

    /* Log form */
    .log-form {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .form-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .form-desc input {
      width: 100%;
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 0.95rem;
    }

    .form-desc input:focus { outline: none; border-color: var(--accent); }

    .macro-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 8px;
    }

    .macro-input-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .macro-input-wrap label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .macro-input-wrap input {
      width: 100%;
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 0.9rem;
      text-align: center;
    }

    .macro-input-wrap input:focus { outline: none; border-color: var(--accent); }

    .log-btn {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .log-btn:hover { opacity: 0.85; }

    /* Quick Add Favorites */
    .favorites-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .fav-btn {
      background: var(--card);
      color: var(--text);
      border: 1.5px solid var(--border);
      padding: 12px 8px;
      border-radius: 12px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, border-color 0.15s;
      line-height: 1.3;
    }
    .fav-btn:active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    /* AI Search */
    .ai-search-wrap { margin-bottom: 8px; }
    .ai-search-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .ai-search-row input {
      flex: 1;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-size: 0.95rem;
    }
    .ai-search-row input:focus { outline: none; border-color: var(--accent); }
    .ai-log-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .ai-log-btn:disabled { opacity: 0.5; cursor: default; }
    .ai-photo-btn {
      background: var(--card);
      border: 1.5px solid var(--border);
      padding: 12px 13px;
      border-radius: 12px;
      font-size: 1.1rem;
      cursor: pointer;
      flex-shrink: 0;
    }
    .ai-status {
      font-size: 0.8rem;
      color: var(--muted);
      min-height: 18px;
      margin-top: 4px;
      padding-left: 2px;
    }
    .manual-toggle {
      font-size: 0.8rem;
      color: var(--muted);
      cursor: pointer;
      margin-bottom: 8px;
      user-select: none;
    }

    .fav-toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1db954;
      color: white;
      padding: 10px 24px;
      border-radius: 24px;
      font-weight: 700;
      font-size: 0.95rem;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 999;
    }
    .fav-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Meal list */
    .meal-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .meal-item {
      background: var(--card);
      border-radius: var(--radius);
      padding: 12px 14px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .meal-info { flex: 1; }

    .meal-name {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .meal-macros {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .meal-macro {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .meal-macro span { color: var(--text); font-weight: 600; }

    .meal-time {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .delete-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 28px;
      height: 28px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      background: var(--red);
      border-color: var(--red);
      color: white;
    }

    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 30px;
      font-size: 0.9rem;
    }

    /* History view */
    /* Daily breakdown cards */
    .day-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .day-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .day-card-date {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text);
    }
    .day-card-cal {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--green);
    }
    .day-card-macros {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 8px;
    }
    .day-macro {
      background: var(--card2);
      border-radius: 10px;
      padding: 8px 6px;
      text-align: center;
    }
    .day-macro-icon { font-size: 1rem; }
    .day-macro-val {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text);
      margin-top: 2px;
    }
    .day-macro-lbl {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 1px;
    }
    .day-card-empty {
      color: var(--muted);
      font-size: 0.8rem;
      font-style: italic;
    }

    .range-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .range-tab {
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .range-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* Stats table */
    .stats-table {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .stats-table table {
      width: 100%;
      border-collapse: collapse;
    }

    .stats-table th {
      background: var(--card2);
      color: var(--muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 10px 12px;
      text-align: left;
    }

    .stats-table td {
      padding: 10px 12px;
      font-size: 0.85rem;
      border-top: 1px solid var(--border);
    }

    .stats-table .avg-val { font-weight: 600; color: var(--accent); }

    /* Goal settings */
    .settings-toggle {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .settings-toggle .chevron {
      transition: transform 0.2s;
      color: var(--muted);
    }

    .settings-toggle.open .chevron { transform: rotate(180deg); }

    .settings-panel {
      display: none;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
    }

    .settings-panel.open { display: block; }

    .goal-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .goal-input-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .goal-input-wrap label {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .goal-input-wrap input {
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 0.9rem;
    }

    .goal-input-wrap input:focus { outline: none; border-color: var(--accent); }

    .save-btn {
      background: var(--green);
      color: #0f0f13;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .save-btn:hover { opacity: 0.85; }

    .save-confirm {
      color: var(--green);
      font-size: 0.8rem;
      margin-left: 10px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .save-confirm.show { opacity: 1; }

    /* Today summary bar */
    .today-date {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* Responsive */
    @media (max-width: 380px) {
      .macro-inputs {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Macro<span>Track</span></div>
</header>

<nav>
  <button class="nav-btn active" onclick="showView('today')">
    <span class="nav-icon">📊</span>
    <span class="nav-label">Today</span>
  </button>
  <button class="nav-btn" onclick="showView('history')">
    <span class="nav-icon">📈</span>
    <span class="nav-label">History</span>
  </button>
</nav>

<div class="container">

  <!-- TODAY VIEW -->
  <div class="view active" id="view-today">

    <div class="today-date" id="today-date"></div>

    <!-- Macro Progress Cards -->
    <div class="macro-grid" id="macro-grid"></div>

    <!-- Today's Meal Chart -->
    <div class="section-title">Today's Meals</div>
    <div class="chart-card">
      <canvas id="todayChart"></canvas>
    </div>

    <div id="favToast" class="fav-toast"></div>

    <!-- Quick Add Favorites -->
    <div class="section-title">Quick Add</div>
    <div class="favorites-grid">
      <button class="fav-btn" onclick="addFavorite(0)">🥣 Oatmeal + Egg Whites</button>
      <button class="fav-btn" onclick="addFavorite(1)">🍗 Chicken + Rice</button>
      <button class="fav-btn" onclick="addFavorite(2)">🍌 Banana</button>
      <button class="fav-btn" onclick="addFavorite(3)">🍎 Apple</button>
      <button class="fav-btn" onclick="addFavorite(4)">🍇 Grapes (1 serving)</button>
      <button class="fav-btn" onclick="addFavorite(5)">🍓 Strawberries (1 serving)</button>
    </div>

    <!-- AI Log Meal -->
    <div class="section-title">Log a Meal</div>
    <div class="ai-search-wrap">
      <div class="ai-search-row">
        <input type="text" id="aiSearchInput" placeholder="e.g. 2 eggs + toast, or 400g chicken breast" autocomplete="off" onkeydown="if(event.key==='Enter') aiLogMeal()">
        <button class="ai-photo-btn" onclick="document.getElementById('photoInput').click()" title="Log from photo">📷</button>
        <button class="ai-log-btn" onclick="aiLogMeal()" id="aiLogBtn">Log</button>
      </div>
      <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none" onchange="handlePhotoSelected(this)">
      <!-- Photo preview + caption -->
      <div id="photoPreviewWrap" style="display:none;margin-top:8px">
        <div style="display:flex;gap:8px;align-items:flex-start">
          <img id="photoPreview" style="width:72px;height:72px;object-fit:cover;border-radius:10px;border:1.5px solid var(--border)">
          <div style="flex:1">
            <input type="text" id="photoCaption" placeholder="Optional: describe the food (e.g. 'double chicken chipotle bowl')" style="width:100%;padding:9px 10px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:0.85rem;box-sizing:border-box">
            <div style="display:flex;gap:6px;margin-top:6px">
              <button class="ai-log-btn" style="flex:1" onclick="aiLogFromPhoto()" id="photoLogBtn">Analyze & Log</button>
              <button onclick="clearPhoto()" style="background:var(--card);border:1.5px solid var(--border);color:var(--muted);padding:8px 12px;border-radius:10px;cursor:pointer;font-size:0.85rem">✕</button>
            </div>
          </div>
        </div>
      </div>
      <div class="ai-status" id="aiStatus"></div>
    </div>
    <!-- Manual fallback (collapsed by default) -->
    <div class="manual-toggle" onclick="toggleManual()">Enter macros manually ▾</div>
    <div class="log-form" id="manualForm" style="display:none">
      <div class="form-row">
        <div class="form-desc">
          <input type="text" id="mealDesc" placeholder="Meal description" autocomplete="off">
        </div>
        <div class="macro-inputs">
          <div class="macro-input-wrap">
            <label>🔥 Cal</label>
            <input type="number" id="mealCal" placeholder="0" min="0">
          </div>
          <div class="macro-input-wrap">
            <label>💪 Protein</label>
            <input type="number" id="mealProtein" placeholder="0" min="0">
          </div>
          <div class="macro-input-wrap">
            <label>🍞 Carbs</label>
            <input type="number" id="mealCarbs" placeholder="0" min="0">
          </div>
          <div class="macro-input-wrap">
            <label>🥑 Fat</label>
            <input type="number" id="mealFat" placeholder="0" min="0">
          </div>
        </div>
        <button class="log-btn" onclick="logMeal()">+ Log Meal</button>
      </div>
    </div>

    <!-- Goal Settings -->
    <button class="settings-toggle" id="settingsToggle" onclick="toggleSettings()">
      ⚙️ Daily Goals
      <span class="chevron">▼</span>
    </button>
    <div class="settings-panel" id="settingsPanel">
      <div class="goal-inputs">
        <div class="goal-input-wrap">
          <label>🔥 Calories</label>
          <input type="number" id="goalCal" min="0">
        </div>
        <div class="goal-input-wrap">
          <label>💪 Protein (g)</label>
          <input type="number" id="goalProtein" min="0">
        </div>
        <div class="goal-input-wrap">
          <label>🍞 Carbs (g)</label>
          <input type="number" id="goalCarbs" min="0">
        </div>
        <div class="goal-input-wrap">
          <label>🥑 Fat (g)</label>
          <input type="number" id="goalFat" min="0">
        </div>
      </div>
      <button class="save-btn" onclick="saveGoals()">Save Goals</button>
      <span class="save-confirm" id="saveConfirm">✓ Saved!</span>
      <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
        <label style="font-size:0.8rem;color:var(--muted);display:block;margin-bottom:6px">🤖 Gemini API Key (for AI food logging)</label>
        <input type="password" id="geminiKeyInput" placeholder="AIza..." style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:0.85rem;box-sizing:border-box">
        <button class="save-btn" style="margin-top:8px" onclick="saveGeminiKey()">Save Key</button>
        <span class="save-confirm" id="keyConfirm">✓ Saved!</span>
      </div>
    </div>

    <!-- Today's Meal Log -->
    <div class="section-title">Today's Log</div>
    <div class="meal-list" id="mealList"></div>

  </div>

  <!-- HISTORY VIEW -->
  <div class="view" id="view-history">

    <div class="section-title" style="margin-top:8px">Last 7 Days</div>
    <div id="dailyBreakdown"></div>

    <div class="section-title" style="margin-top:20px">Calorie History</div>
    <div class="range-tabs" id="rangeTabs">
      <button class="range-tab active" data-range="7" onclick="setRange(7, this)">7D</button>
      <button class="range-tab" data-range="14" onclick="setRange(14, this)">14D</button>
      <button class="range-tab" data-range="30" onclick="setRange(30, this)">30D</button>
      <button class="range-tab" data-range="90" onclick="setRange(90, this)">3M</button>
      <button class="range-tab" data-range="0" onclick="setRange(0, this)">All</button>
    </div>

    <div class="chart-card">
      <canvas id="historyChart"></canvas>
    </div>

    <div class="section-title">Averages</div>
    <div class="stats-table" id="statsTable"></div>
  </div>

</div>

<script>
// ─── Storage ──────────────────────────────────────────────────────────────────

function getLogs() {
  return JSON.parse(localStorage.getItem(LOGS_KEY) || '[]');
}

function saveLogs(logs) {
  localStorage.setItem(LOGS_KEY, JSON.stringify(logs));
}

// Tombstone: track deleted entries so they don't come back on sync
const DELETED_KEY = 'mt_deleted';
function getDeleted() {
  return new Set(JSON.parse(localStorage.getItem(DELETED_KEY) || '[]'));
}
function addDeleted(entry) {
  const deleted = getDeleted();
  deleted.add(`${entry.date}|${entry.time}|${entry.description}`);
  localStorage.setItem(DELETED_KEY, JSON.stringify([...deleted]));
}
function isDeleted(entry) {
  return getDeleted().has(`${entry.date}|${entry.time}|${entry.description}`);
}

function getTargets() {
  return JSON.parse(localStorage.getItem(TARGETS_KEY) || JSON.stringify(DEFAULT_TARGETS));
}

function saveTargets(t) {
  localStorage.setItem(TARGETS_KEY, JSON.stringify(t));
}

// Seed on first load
// Only seed if no data exists at all (never overwrites user data)
if (!localStorage.getItem(LOGS_KEY)) {
  saveLogs(SEED);
  localStorage.setItem(SEED_KEY, '1');
}

// ─── Helpers ──────────────────────────────────────────────────────────────────

function todayStr() {
  const d = new Date();
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}`;
}

function nowTime() {
  const d = new Date();
  return d.toTimeString().slice(0, 5);
}

function formatDate(str) {
  const [y, m, d] = str.split('-');
  const dt = new Date(parseInt(y), parseInt(m) - 1, parseInt(d));
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function segBar(pct, filled = '▓', empty = '░', count = 10) {
  const n = Math.min(count, Math.round(pct / 100 * count));
  return filled.repeat(n) + empty.repeat(count - n);
}

function macroColor(key) {
  return { calories: '#6c63ff', protein: '#43e97b', carbs: '#ffd166', fat: '#ff6b6b' }[key];
}

// ─── Today View ───────────────────────────────────────────────────────────────

let todayChartInst = null;

function renderToday() {
  const today = todayStr();
  const logs = getLogs();
  const targets = getTargets();
  const todayLogs = logs.filter(l => l.date === today).sort((a, b) => b.time.localeCompare(a.time));

  // Date header
  const dateEl = document.getElementById('today-date');
  const d = new Date();
  dateEl.textContent = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

  // Totals
  const totals = { calories: 0, protein: 0, carbs: 0, fat: 0 };
  todayLogs.forEach(l => {
    totals.calories += l.calories;
    totals.protein += l.protein;
    totals.carbs += l.carbs;
    totals.fat += l.fat;
  });

  // Macro cards
  const macros = [
    { key: 'calories', emoji: '🔥', label: 'Calories', unit: '' },
    { key: 'protein', emoji: '💪', label: 'Protein', unit: 'g' },
    { key: 'carbs', emoji: '🍞', label: 'Carbs', unit: 'g' },
    { key: 'fat', emoji: '🥑', label: 'Fat', unit: 'g' },
  ];

  const grid = document.getElementById('macro-grid');
  grid.innerHTML = macros.map(m => {
    const consumed = totals[m.key];
    const target = targets[m.key];
    const pct = target > 0 ? Math.round(consumed / target * 100) : 0;
    const remaining = target - consumed;
    const bar = segBar(pct);
    const color = macroColor(m.key);

    let remClass = 'remaining-ok';
    let remText = `${remaining}${m.unit} remaining`;
    if (remaining < 0) {
      remClass = 'remaining-over';
      remText = `${Math.abs(remaining)}${m.unit} over`;
    } else if (pct >= 85) {
      remClass = 'remaining-warn';
    }

    return `
      <div class="macro-card">
        <div class="macro-card-header">
          <span class="macro-emoji">${m.emoji}</span>
          <span class="macro-label">${m.label}</span>
        </div>
        <div class="macro-values">
          <div class="macro-consumed" style="color:${color}">${consumed}${m.unit}</div>
          <div class="macro-target">of ${target}${m.unit}</div>
        </div>
        <div class="macro-bar" style="color:${color}">${bar}</div>
        <div class="macro-pct">${pct}%</div>
        <div class="macro-remaining ${remClass}">${remText}</div>
      </div>
    `;
  }).join('');

  // Today's meal chart (stacked bar by meal)
  const forChart = [...todayLogs].sort((a, b) => a.time.localeCompare(b.time));
  const labels = forChart.map(l => `${l.time} ${l.description.length > 15 ? l.description.slice(0, 15) + '…' : l.description}`);

  if (todayChartInst) todayChartInst.destroy();

  const ctx = document.getElementById('todayChart').getContext('2d');

  if (forChart.length === 0) {
    ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
    todayChartInst = null;
  } else {
    todayChartInst = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          {
            label: 'Protein',
            data: forChart.map(l => l.protein * 4),
            backgroundColor: '#43e97b',
            borderRadius: 0,
            stack: 'macros'
          },
          {
            label: 'Carbs',
            data: forChart.map(l => l.carbs * 4),
            backgroundColor: '#ffd166',
            borderRadius: 0,
            stack: 'macros'
          },
          {
            label: 'Fat',
            data: forChart.map(l => l.fat * 9),
            backgroundColor: '#ff6b6b',
            borderRadius: 4,
            stack: 'macros'
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
          legend: {
            labels: { color: '#8888aa', boxWidth: 12, font: { size: 11 } }
          },
          tooltip: {
            callbacks: {
              label: ctx => ` ${ctx.dataset.label}: ${Math.round(ctx.raw)} kcal`
            }
          }
        },
        scales: {
          x: {
            ticks: { color: '#8888aa', font: { size: 10 } },
            grid: { color: '#2e2e42' }
          },
          y: {
            ticks: { color: '#8888aa', font: { size: 10 } },
            grid: { color: '#2e2e42' },
            title: { display: true, text: 'kcal', color: '#8888aa', font: { size: 10 } }
          }
        }
      }
    });
  }

  // Meal list
  const list = document.getElementById('mealList');
  if (todayLogs.length === 0) {
    list.innerHTML = '<div class="empty-state">No meals logged today yet.<br>Add one above! 👆</div>';
    return;
  }

  const allLogs = getLogs();
  list.innerHTML = todayLogs.map(meal => {
    const idx = allLogs.findIndex(l =>
      l.date === meal.date && l.time === meal.time && l.description === meal.description
    );
    return `
      <div class="meal-item">
        <div class="meal-info">
          <div class="meal-name">${meal.description}</div>
          <div class="meal-macros">
            <span class="meal-macro">🔥 <span>${meal.calories}</span> cal</span>
            <span class="meal-macro">💪 <span>${meal.protein}g</span> protein</span>
            <span class="meal-macro">🍞 <span>${meal.carbs}g</span> carbs</span>
            <span class="meal-macro">🥑 <span>${meal.fat}g</span> fat</span>
          </div>
        </div>
        <div class="meal-time">${meal.time}</div>
        <button class="delete-btn" onclick="deleteMeal(${idx})" title="Delete">×</button>
      </div>
    `;
  }).join('');

  // Populate goal inputs
  const t = getTargets();
  document.getElementById('goalCal').value = t.calories;
  document.getElementById('goalProtein').value = t.protein;
  document.getElementById('goalCarbs').value = t.carbs;
  document.getElementById('goalFat').value = t.fat;
}

// ─── AI Log Meal ──────────────────────────────────────────────────────────────
async function aiLogMeal() {
  const input = document.getElementById('aiSearchInput');
  const text = input.value.trim();
  if (!text) return;

  const key = getGeminiKey();
  if (!key) {
    document.getElementById('aiStatus').textContent = '⚠️ Add your Gemini API key in ⚙️ Settings first.';
    return;
  }

  const btn = document.getElementById('aiLogBtn');
  btn.disabled = true;
  btn.textContent = '...';
  document.getElementById('aiStatus').textContent = '🤖 Parsing macros...';

  try {
    const prompt = `You are a macro logging assistant. Parse this food and return ONLY valid JSON, no markdown.
Rules: use USDA averages, make best guesses, never ask follow-up questions.
Keys: description (string), calories (number), protein (number, grams), carbs (number, grams), fat (number, grams)
Food: "${text}"`;

    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'API error');

    let raw = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '';
    const match = raw.match(/```(?:json)?\n?([\s\S]*?)\n?```/) || raw.match(/(\{[\s\S]*\})/);
    const parsed = JSON.parse(match ? (match[1] || match[0]) : raw);

    const entry = {
      date: todayStr(),
      time: nowTime12(),
      description: parsed.description,
      calories: parsed.calories,
      protein: parsed.protein,
      carbs: parsed.carbs,
      fat: parsed.fat
    };
    const logs = getLogs();
    logs.push(entry);
    saveLogs(logs);
    renderToday();

    input.value = '';
    document.getElementById('aiStatus').textContent = `✓ Logged: ${parsed.description} — ${parsed.calories} cal`;
    setTimeout(() => document.getElementById('aiStatus').textContent = '', 3000);
  } catch (e) {
    document.getElementById('aiStatus').textContent = `❌ ${e.message}`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Log';
  }
}

// ─── Photo Logging ────────────────────────────────────────────────────────────
let currentPhotoBase64 = null;
let currentPhotoMime = 'image/jpeg';

function handlePhotoSelected(input) {
  const file = input.files[0];
  if (!file) return;
  currentPhotoMime = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    currentPhotoBase64 = dataUrl.split(',')[1];
    document.getElementById('photoPreview').src = dataUrl;
    document.getElementById('photoPreviewWrap').style.display = 'block';
    document.getElementById('photoCaption').focus();
  };
  reader.readAsDataURL(file);
}

function clearPhoto() {
  currentPhotoBase64 = null;
  document.getElementById('photoPreviewWrap').style.display = 'none';
  document.getElementById('photoInput').value = '';
  document.getElementById('photoCaption').value = '';
  document.getElementById('aiStatus').textContent = '';
}

async function aiLogFromPhoto() {
  if (!currentPhotoBase64) return;
  const key = getGeminiKey();
  if (!key) {
    document.getElementById('aiStatus').textContent = '⚠️ Add your Gemini API key in ⚙️ Settings first.';
    return;
  }
  const caption = document.getElementById('photoCaption').value.trim();
  const btn = document.getElementById('photoLogBtn');
  btn.disabled = true;
  btn.textContent = '...';
  document.getElementById('aiStatus').textContent = '🤖 Analyzing photo...';

  const captionNote = caption
    ? `The user says: "${caption}". Trust this description — the image is supplementary.`
    : 'Use visual analysis to identify the food.';

  const prompt = `Analyze this food image and return macros. ${captionNote}
Rules: if it's a nutrition label read values exactly; if it's a food photo estimate using USDA averages; never ask follow-up questions.
Return ONLY valid JSON, no markdown: {"description": "...", "calories": number, "protein": number, "carbs": number, "fat": number}`;

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{
          parts: [
            { text: prompt },
            { inlineData: { mimeType: currentPhotoMime, data: currentPhotoBase64 } }
          ]
        }]
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'API error');

    let raw = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '';
    const match = raw.match(/```(?:json)?\n?([\s\S]*?)\n?```/) || raw.match(/(\{[\s\S]*\})/);
    const parsed = JSON.parse(match ? (match[1] || match[0]) : raw);

    const entry = {
      date: todayStr(),
      time: nowTime12(),
      description: parsed.description,
      calories: parsed.calories,
      protein: parsed.protein,
      carbs: parsed.carbs,
      fat: parsed.fat
    };
    const logs = getLogs();
    logs.push(entry);
    saveLogs(logs);
    renderToday();
    clearPhoto();
    document.getElementById('aiStatus').textContent = `✓ Logged: ${parsed.description} — ${parsed.calories} cal`;
    setTimeout(() => document.getElementById('aiStatus').textContent = '', 3000);
  } catch(e) {
    document.getElementById('aiStatus').textContent = `❌ ${e.message}`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Analyze & Log';
  }
}

function toggleManual() {
  const f = document.getElementById('manualForm');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
}

const FAVORITES = [
  { description: 'Oatmeal (1 serving) + Egg Whites (240g) + Honey', calories: 410, protein: 28, carbs: 56, fat: 2 },
  { description: 'Chicken Breast (400g) + White Rice (170g cooked)', calories: 660, protein: 87, carbs: 48, fat: 10 },
  { description: 'Banana (medium)', calories: 105, protein: 1, carbs: 27, fat: 0 },
  { description: 'Apple (medium)', calories: 95, protein: 0, carbs: 25, fat: 0 },
  { description: 'Grapes (1 serving, ~150g)', calories: 104, protein: 1, carbs: 27, fat: 0 },
  { description: 'Strawberries (1 serving, ~152g)', calories: 49, protein: 1, carbs: 12, fat: 0 },
];

function addFavorite(idx) {
  const fav = FAVORITES[idx];
  const entry = {
    date: todayStr(),
    time: nowTime12(),
    description: fav.description,
    calories: fav.calories,
    protein: fav.protein,
    carbs: fav.carbs,
    fat: fav.fat
  };
  const logs = getLogs();
  logs.push(entry);
  saveLogs(logs);
  renderToday();
  // Show toast
  const toast = document.getElementById('favToast');
  toast.textContent = `✓ Logged!`;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function nowTime12() {
  const d = new Date();
  let h = d.getHours(), m = d.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')} ${ampm}`;
}

function deleteMeal(idx) {
  const logs = getLogs();
  const entry = logs[idx];
  if (entry) addDeleted(entry);
  logs.splice(idx, 1);
  saveLogs(logs);
  renderToday();
}

function logMeal() {
  const desc = document.getElementById('mealDesc').value.trim();
  const cal = parseInt(document.getElementById('mealCal').value) || 0;
  const protein = parseInt(document.getElementById('mealProtein').value) || 0;
  const carbs = parseInt(document.getElementById('mealCarbs').value) || 0;
  const fat = parseInt(document.getElementById('mealFat').value) || 0;

  if (!desc) {
    document.getElementById('mealDesc').focus();
    return;
  }

  const logs = getLogs();
  logs.push({
    date: todayStr(),
    time: nowTime(),
    description: desc,
    calories: cal,
    protein,
    carbs,
    fat
  });
  saveLogs(logs);

  // Clear form
  document.getElementById('mealDesc').value = '';
  document.getElementById('mealCal').value = '';
  document.getElementById('mealProtein').value = '';
  document.getElementById('mealCarbs').value = '';
  document.getElementById('mealFat').value = '';

  renderToday();
  document.getElementById('mealDesc').focus();
}

// Enter key support
document.addEventListener('DOMContentLoaded', () => {
  ['mealDesc','mealCal','mealProtein','mealCarbs','mealFat'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') logMeal();
    });
  });
});

// ─── History View ─────────────────────────────────────────────────────────────

let historyChartInst = null;
let currentRange = 7;

function setRange(days, el) {
  document.querySelectorAll('.range-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentRange = days;
  renderHistory();
}

function renderDailyBreakdown() {
  const logs = getLogs();
  const container = document.getElementById('dailyBreakdown');
  const today = new Date();

  // Build last 7 days (most recent first)
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    days.push(d.toLocaleDateString('en-CA')); // YYYY-MM-DD
  }

  container.innerHTML = days.map((dateStr, i) => {
    const entries = logs.filter(e => e.date === dateStr);
    const d = new Date(dateStr + 'T12:00:00');
    const dayLabel = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    const isToday = dateStr === today.toLocaleDateString('en-CA');
    const displayLabel = isToday ? `Today — ${d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}` : dayLabel;

    if (!entries.length) {
      return `<div class="day-card">
        <div class="day-card-header">
          <span class="day-card-date">${displayLabel}</span>
          <span class="day-card-empty">no data</span>
        </div>
      </div>`;
    }

    const t = entries.reduce((acc, e) => ({
      calories: acc.calories + (Number(e.calories)||0),
      protein:  acc.protein  + (Number(e.protein)||0),
      carbs:    acc.carbs    + (Number(e.carbs)||0),
      fat:      acc.fat      + (Number(e.fat)||0),
    }), {calories:0, protein:0, carbs:0, fat:0});

    return `<div class="day-card">
      <div class="day-card-header">
        <span class="day-card-date">${displayLabel}</span>
        <span class="day-card-cal">🔥 ${t.calories.toLocaleString()} cal</span>
      </div>
      <div class="day-card-macros">
        <div class="day-macro">
          <div class="day-macro-icon">🔥</div>
          <div class="day-macro-val">${t.calories.toLocaleString()}</div>
          <div class="day-macro-lbl">cal</div>
        </div>
        <div class="day-macro">
          <div class="day-macro-icon">💪</div>
          <div class="day-macro-val">${t.protein}g</div>
          <div class="day-macro-lbl">protein</div>
        </div>
        <div class="day-macro">
          <div class="day-macro-icon">🍞</div>
          <div class="day-macro-val">${t.carbs}g</div>
          <div class="day-macro-lbl">carbs</div>
        </div>
        <div class="day-macro">
          <div class="day-macro-icon">🥑</div>
          <div class="day-macro-val">${t.fat}g</div>
          <div class="day-macro-lbl">fat</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderHistory() {
  renderDailyBreakdown();
  const logs = getLogs();
  if (logs.length === 0) {
    document.getElementById('statsTable').innerHTML = '<p style="padding:20px;color:var(--muted)">No data yet.</p>';
    return;
  }

  // Group by date
  const byDate = {};
  logs.forEach(l => {
    if (!byDate[l.date]) byDate[l.date] = { calories: 0, protein: 0, carbs: 0, fat: 0, count: 0 };
    byDate[l.date].calories += l.calories;
    byDate[l.date].protein += l.protein;
    byDate[l.date].carbs += l.carbs;
    byDate[l.date].fat += l.fat;
    byDate[l.date].count += 1;
  });

  let dates = Object.keys(byDate).sort();

  if (currentRange > 0) {
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - currentRange);
    const cutoffStr = cutoff.toISOString().split('T')[0];
    dates = dates.filter(d => d >= cutoffStr);
  }

  const labels = dates.map(d => formatDate(d));
  const calData = dates.map(d => byDate[d].calories);

  const targets = getTargets();

  if (historyChartInst) historyChartInst.destroy();

  const ctx = document.getElementById('historyChart').getContext('2d');

  historyChartInst = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Calories',
          data: calData,
          borderColor: '#6c63ff',
          backgroundColor: 'rgba(108,99,255,0.15)',
          tension: 0.3,
          fill: true,
          pointBackgroundColor: '#6c63ff',
          pointRadius: 4,
          pointHoverRadius: 6
        },
        {
          label: 'Goal',
          data: dates.map(() => targets.calories),
          borderColor: '#ff6b6b',
          borderDash: [6, 3],
          borderWidth: 1.5,
          pointRadius: 0,
          fill: false,
          tension: 0
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: {
          labels: { color: '#8888aa', boxWidth: 12, font: { size: 11 } }
        }
      },
      scales: {
        x: {
          ticks: { color: '#8888aa', font: { size: 10 }, maxRotation: 45 },
          grid: { color: '#2e2e42' }
        },
        y: {
          ticks: { color: '#8888aa', font: { size: 10 } },
          grid: { color: '#2e2e42' }
        }
      }
    }
  });

  // Averages table
  if (dates.length === 0) {
    document.getElementById('statsTable').innerHTML = '<p style="padding:20px;color:var(--muted)">No data in range.</p>';
    return;
  }

  const avg = k => Math.round(dates.reduce((s, d) => s + byDate[d][k], 0) / dates.length);

  document.getElementById('statsTable').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Metric</th>
          <th>Daily Avg</th>
          <th>Goal</th>
          <th>vs Goal</th>
        </tr>
      </thead>
      <tbody>
        ${[
          { label: '🔥 Calories', key: 'calories', unit: '' },
          { label: '💪 Protein', key: 'protein', unit: 'g' },
          { label: '🍞 Carbs', key: 'carbs', unit: 'g' },
          { label: '🥑 Fat', key: 'fat', unit: 'g' },
        ].map(m => {
          const a = avg(m.key);
          const goal = targets[m.key];
          const diff = a - goal;
          const diffStr = diff >= 0 ? `+${diff}${m.unit}` : `${diff}${m.unit}`;
          const diffColor = m.key === 'calories' ? (Math.abs(diff) < 200 ? 'var(--green)' : diff > 0 ? 'var(--red)' : 'var(--yellow)') : 'var(--muted)';
          return `
            <tr>
              <td>${m.label}</td>
              <td class="avg-val">${a}${m.unit}</td>
              <td style="color:var(--muted)">${goal}${m.unit}</td>
              <td style="color:${diffColor};font-weight:600">${diffStr}</td>
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
  `;
}

// ─── View Switching ───────────────────────────────────────────────────────────

function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`view-${name}`).classList.add('active');
  event.target.classList.add('active');

  if (name === 'history') renderHistory();
  if (name === 'today') renderToday();
}

// ─── Init ─────────────────────────────────────────────────────────────────────

// Fetch latest data from GitHub and merge with localStorage
async function syncFromGithub() {
  try {
    const res = await fetch('/macro-tracker/data.json?t=' + Date.now());
    if (!res.ok) return;
    const remote = await res.json();
    if (!Array.isArray(remote) || !remote.length) return;
    const local = getLogs();
    // Merge: remote is canonical; also include any local-only entries (new bot or manual logs)
    const map = new Map();
    remote.forEach(e => {
      if (isDeleted(e)) return; // respect user deletions
      const key = `${e.date}|${e.time}|${e.description}`;
      map.set(key, e);
    });
    local.forEach(e => {
      if (isDeleted(e)) return; // respect user deletions
      const key = `${e.date}|${e.time}|${e.description}`;
      if (!map.has(key)) map.set(key, e); // keep local-only entries
    });
    const merged = Array.from(map.values()).sort((a,b) => {
      if (a.date !== b.date) return a.date.localeCompare(b.date);
      return a.time.localeCompare(b.time);
    });
    saveLogs(merged);
    renderToday();
    renderHistory();
  } catch(_) {}
}

// v3: full reset — wipe stale/incorrect localStorage, let data.json repopulate
(function purgeFakeSeedEntries() {
  const PURGE_KEY = 'mt_purged_v3';
  if (localStorage.getItem(PURGE_KEY)) return;
  localStorage.removeItem(LOGS_KEY);
  localStorage.removeItem(SEED_KEY);
  localStorage.setItem(PURGE_KEY, '1');
})();

syncFromGithub();
renderToday();

// Auto-sync every 30 seconds so new bot logs appear in real time
setInterval(syncFromGithub, 30 * 1000);

// Also sync when app comes back to foreground (e.g. switching back from Telegram)
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') syncFromGithub();
});

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/macro-tracker/sw.js')
    .catch(() => {});
}
</script>
